<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Não Para CMS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800;900&family=Manrope:wght@400;500;600;700&family=Spline+Sans+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0b0d09;--panel:#121510;--card:#171a13;--card2:#1c2018;
  --line:rgba(255,255,255,.09);--line2:rgba(255,255,255,.14);
  --paper:#f1f0e8;--volt:#c9f73f;--volt-ink:#1a2400;
  --dim:rgba(241,240,232,.56);--faint:rgba(241,240,232,.3);--red:#ff6b6b;--blue:#2a6fdb;
  --disp:"Archivo",sans-serif;--mono:"Spline Sans Mono",monospace;--body:"Manrope",sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--body);font-size:14px;background:var(--ink);color:var(--paper);overflow:hidden}
a{color:inherit;text-decoration:none}button{cursor:pointer;font-family:inherit;color:inherit}
::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.16);border-radius:4px}
::-webkit-scrollbar-track{background:transparent}

/* login */
#login-screen{display:flex;align-items:center;justify-content:center;height:100vh}
.login-box{width:100%;max-width:380px;padding:44px 38px;border:1px solid var(--line);background:var(--panel)}
.login-logo{font-family:var(--disp);font-weight:900;font-size:20px;text-transform:uppercase;letter-spacing:-.02em;margin-bottom:28px}
.login-logo b{color:var(--volt)}
.login-box h2{font-family:var(--disp);font-size:26px;font-weight:900;text-transform:uppercase;letter-spacing:-.02em;margin-bottom:6px}
.login-box p{color:var(--dim);font-size:13px;margin-bottom:24px}
.login-err{color:var(--red);font-size:12px;min-height:16px;margin-top:10px;font-family:var(--mono)}
.login-hint{margin-top:18px;font-family:var(--mono);font-size:11px;color:var(--faint)}

/* app shell — 3 columns */
#app{display:none;grid-template-columns:200px 380px 1fr;grid-template-rows:52px 1fr;height:100vh}
.topbar{grid-column:1/-1;display:flex;align-items:center;gap:18px;padding:0 18px;background:#0e110c;border-bottom:1px solid var(--line)}
.tb-brand{font-family:var(--disp);font-weight:900;text-transform:uppercase;font-size:15px;letter-spacing:-.02em;display:flex;align-items:center;gap:8px}
.tb-brand b{color:var(--volt)}
.tb-mark{background:var(--volt);color:var(--volt-ink);padding:3px 6px;font-size:12px}
.tb-sep{width:1px;height:24px;background:var(--line)}
.tb-preview-ctrls{display:flex;align-items:center;gap:10px;margin-left:6px}
.tb-preview-ctrls label{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint)}
#page-sel{background:var(--card);border:1px solid var(--line2);color:var(--paper);padding:6px 10px;font-family:var(--body);font-size:13px}
.langtog{display:flex;border:1px solid var(--line2)}
.langtog button{padding:6px 11px;font-family:var(--disp);font-weight:700;font-size:11px;background:transparent;color:var(--dim)}
.langtog button.on{background:var(--volt);color:var(--volt-ink)}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:14px}
.save-state{font-family:var(--mono);font-size:11px;letter-spacing:.04em;color:var(--faint)}
.save-state.saving{color:var(--volt)}.save-state.ok{color:var(--dim)}
#logout{background:transparent;border:1px solid var(--line2);color:var(--dim);font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;padding:6px 11px}
#logout:hover{color:var(--paper);border-color:var(--line2)}

/* sidebar */
.sidenav{background:#0e110c;border-right:1px solid var(--line);padding:10px 0;overflow-y:auto}
.navbtn{width:100%;display:flex;align-items:center;gap:11px;padding:11px 18px;background:transparent;border:0;
  color:var(--dim);font-size:13.5px;font-weight:600;text-align:left;transition:.15s}
.navbtn:hover{color:var(--paper);background:rgba(255,255,255,.04)}
.navbtn.on{color:var(--volt);background:rgba(201,247,63,.08);box-shadow:inset 3px 0 0 var(--volt)}
.navbtn__i{font-size:15px;width:20px;text-align:center;flex:none}

/* control panel */
.panel{background:var(--panel);border-right:1px solid var(--line);overflow-y:auto;padding:22px 20px 60px}
.phead{margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--line)}
.phead h2{font-family:var(--disp);font-weight:900;font-size:21px;text-transform:uppercase;letter-spacing:-.02em}
.phead p{color:var(--dim);font-size:12.5px;margin-top:5px;line-height:1.5}

/* preview */
.preview-wrap{background:#0a0c08;position:relative;overflow:hidden;display:flex;flex-direction:column}
.preview-bar{height:30px;background:#0e110c;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:7px;padding:0 14px;flex:none}
.pb-dot{width:9px;height:9px;border-radius:50%;background:rgba(255,255,255,.16)}
.pb-url{margin-left:8px;font-family:var(--mono);font-size:10.5px;color:var(--faint)}
.pb-edit-badge{margin-left:auto;font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--volt);display:none}
#preview{flex:1;width:100%;border:0;background:#fff}

/* form controls */
.fld{margin-bottom:14px}
.fld label{display:block;font-family:var(--mono);font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);margin-bottom:7px}
.inp{width:100%;background:#0c0f09;border:1px solid var(--line2);color:var(--paper);padding:10px 12px;font-family:var(--body);font-size:13.5px;transition:border-color .15s}
.inp:focus{outline:none;border-color:var(--volt)}
.inp.code{font-family:var(--mono);font-size:12px;line-height:1.5;resize:vertical}
select.inp{cursor:pointer}
.two{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.subh{font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--volt);margin:18px 0 10px}
.pill{font-size:9.5px;background:rgba(255,255,255,.1);padding:2px 6px;color:var(--faint);font-family:var(--mono);letter-spacing:.04em}
.charcount{font-family:var(--mono);font-size:10px;color:var(--faint);margin-top:5px}
.muted{color:var(--dim);font-size:12.5px;line-height:1.5;margin-bottom:10px}
.muted-row{font-family:var(--mono);font-size:11px;color:var(--dim);padding:10px 0;border-top:1px solid var(--line);margin-top:14px}
.linkbtn{background:none;border:0;color:var(--volt);text-decoration:underline;font-size:inherit;font-family:inherit;padding:0}

/* buttons */
.btn-primary{display:inline-flex;align-items:center;gap:7px;background:var(--volt);color:var(--volt-ink);font-family:var(--disp);font-weight:800;text-transform:uppercase;font-size:12.5px;letter-spacing:.02em;padding:12px 20px;border:0;margin-top:6px;transition:opacity .15s}
.btn-primary:hover{opacity:.88}
.btn-ghost{background:transparent;border:1px solid var(--line2);color:var(--dim);font-family:var(--mono);font-size:11px;letter-spacing:.06em;text-transform:uppercase;padding:10px 16px;margin-top:10px;width:100%}
.btn-ghost:hover{color:var(--paper)}
.btn-sm{background:transparent;border:1px solid var(--line2);color:var(--dim);font-family:var(--mono);font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;padding:7px 12px;transition:.15s}
.btn-sm:hover{color:var(--paper)}
.btn-danger{border-color:#5c1f1f;color:var(--red)}.btn-danger:hover{background:rgba(255,107,107,.1)}
.filebtn{display:inline-block}

/* big toggle */
.big-toggle{display:flex;align-items:center;gap:14px;padding:18px;border:1px solid var(--line2);background:var(--card);cursor:pointer;transition:.2s;margin-bottom:18px}
.big-toggle.on{border-color:var(--volt);background:rgba(201,247,63,.07)}
.big-toggle__dot{width:42px;height:42px;border-radius:50%;border:2px solid var(--line2);flex:none;position:relative;transition:.2s}
.big-toggle.on .big-toggle__dot{border-color:var(--volt);background:var(--volt)}
.big-toggle.on .big-toggle__dot::after{content:"✓";position:absolute;inset:0;display:grid;place-items:center;color:var(--volt-ink);font-weight:800;font-size:20px}
.big-toggle__t{font-family:var(--disp);font-weight:800;font-size:15px;text-transform:uppercase;letter-spacing:-.01em}
.big-toggle__s{color:var(--dim);font-size:12px;margin-top:3px}
.tip-list{display:flex;flex-direction:column;gap:10px}
.tip{display:flex;gap:12px;padding:14px;border:1px solid var(--line);background:var(--card)}
.tip__ic{font-size:19px;flex:none}
.tip b{font-size:13.5px}.tip p{color:var(--dim);font-size:12px;margin-top:3px;line-height:1.45}

/* content list */
.clist{display:flex;flex-direction:column;gap:8px}
.citem{border:1px solid var(--line);background:var(--card);padding:11px 13px}
.citem__sel{font-family:var(--mono);font-size:10px;color:var(--faint);margin-bottom:5px;word-break:break-all}
.citem__val{font-size:13px;margin-bottom:9px;color:var(--paper)}
.empty{color:var(--faint);text-align:center;padding:40px 20px;line-height:1.7;font-size:13px}

/* theme */
.swatches{display:flex;gap:7px;flex-wrap:wrap;align-items:center}
.sw{width:30px;height:30px;border:2px solid transparent;cursor:pointer;border-radius:50%}
.sw.on{border-color:var(--paper);box-shadow:0 0 0 2px var(--ink) inset}
.sw-custom{width:34px;height:30px;background:transparent;border:1px solid var(--line2);cursor:pointer;padding:0}
.color-row{display:flex;gap:8px}.color-row input[type=color]{width:42px;height:38px;background:transparent;border:1px solid var(--line2);padding:0;cursor:pointer;flex:none}
.range{width:100%;accent-color:var(--volt)}
.grp{border:1px solid var(--line);margin-bottom:14px}
.grp__t{font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--volt);padding:11px 14px;border-bottom:1px solid var(--line);background:rgba(201,247,63,.04)}
.grp .fld{padding:0 14px;margin:14px 0}.grp .fld:first-of-type{margin-top:14px}.grp>.btn-primary,.grp>.btn-sm,.grp>.muted{margin:0 14px 14px}
.grp.danger{border-color:#4a1c1c}

/* images */
.imgrow{display:grid;grid-template-columns:96px 1fr;gap:12px;border:1px solid var(--line);background:var(--card);padding:12px;margin-bottom:10px}
.imgrow__pv{width:96px;height:68px;background:#0c0f09;border:1px solid var(--line);overflow:hidden}
.imgrow__pv img{width:100%;height:100%;object-fit:cover}
.imgrow__ct label{display:block;font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--volt);margin-bottom:7px}
.imgrow__ct .inp{margin-bottom:7px}
.imgrow__btns{display:flex;gap:6px}

/* nav rows */
.navrow{display:grid;grid-template-columns:18px 1fr 1fr 1.3fr;gap:6px;align-items:center;margin-bottom:7px}
.navrow .ix{font-family:var(--mono);font-size:10px;color:var(--faint)}

/* ad cards */
.adcard{border:1px solid var(--line);background:var(--card);padding:13px 15px;margin:10px 0}
.adcard__h{display:flex;align-items:center;gap:9px;margin-bottom:7px}
.badge{font-family:var(--mono);font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;padding:2px 7px}
.badge.on{background:var(--volt);color:var(--volt-ink)}.badge.off{background:rgba(255,255,255,.1);color:var(--dim)}
.adcard__m{font-family:var(--mono);font-size:11px;color:var(--dim);margin-bottom:11px}
.adcard__m code{color:var(--volt);background:rgba(201,247,63,.1);padding:1px 5px}
.adcard__a{display:flex;gap:6px}
.pick-row{display:flex;gap:6px}.pick-row .inp{flex:1}

/* modal */
#modal{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.72);align-items:center;justify-content:center;padding:20px}
#modal-content{background:#15180f;border:1px solid var(--line2);padding:30px 28px;width:100%;max-width:540px;max-height:88vh;overflow-y:auto}
#modal-content h3{font-family:var(--disp);font-weight:900;text-transform:uppercase;font-size:18px;letter-spacing:-.01em;margin-bottom:18px}
.modal-btns{display:flex;gap:10px;margin-top:18px}
#imgdlg-pv,.imgrow__pv img{width:100%;height:100%;object-fit:cover}

/* toast */
.toast{position:fixed;bottom:24px;right:24px;z-index:300;background:var(--volt);color:var(--volt-ink);font-family:var(--mono);font-size:12.5px;padding:12px 18px;transform:translateY(70px);opacity:0;transition:.25s;max-width:340px}
.toast.show{transform:none;opacity:1}.toast.err{background:var(--red);color:#fff}

@media(max-width:1100px){#app{grid-template-columns:56px 340px 1fr}.navbtn span:not(.navbtn__i){display:none}.navbtn{justify-content:center}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">NÃO<b>PARA</b></div>
    <h2>Área de Gestão</h2>
    <p>Introduz a senha para aceder ao painel.</p>
    <form id="login-form">
      <input class="inp" type="password" id="login-pw" placeholder="Senha" autocomplete="current-password" required>
      <button class="btn-primary" type="submit" style="width:100%;justify-content:center;margin-top:12px">Entrar</button>
      <div class="login-err" id="login-err"></div>
    </form>
    <p class="login-hint">Senha padrão: <b style="color:var(--dim)">naopara2026</b></p>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="tb-brand"><span class="tb-mark">▶</span>NÃO<b>PARA</b></div>
    <div class="tb-sep"></div>
    <div class="tb-preview-ctrls">
      <label>Página</label>
      <select id="page-sel"></select>
      <div class="langtog">
        <button data-lang="pt" class="on">PT</button>
        <button data-lang="en">EN</button>
      </div>
    </div>
    <div class="tb-right">
      <span class="save-state ok" id="save-state">✓ Guardado</span>
      <button id="logout">Sair</button>
    </div>
  </div>

  <aside class="sidenav" id="sidenav"></aside>
  <section class="panel" id="panel"></section>

  <div class="preview-wrap">
    <div class="preview-bar">
      <span class="pb-dot"></span><span class="pb-dot"></span><span class="pb-dot"></span>
      <span class="pb-url" id="pb-url">naopara.pt</span>
      <span class="pb-edit-badge" id="pb-edit">● modo edição</span>
    </div>
    <iframe id="preview" title="Pré-visualização"></iframe>
  </div>
</div>

<div id="modal"><div id="modal-content"></div></div>
<div class="toast" id="toast"></div>

<script src="visual.js"></script>
<script src="admin.js"></script>
</body>
</html>
